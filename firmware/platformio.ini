[platformio]
default_envs = prototype_e_esp32s3_lcd13

[env:solwearos]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 2m
board_build.f_cpu = 64000000L
board_upload.maximum_size = 16777216
board_build.flash_size = 16MB
upload_protocol = picotool

build_flags =
    ; --- TFT_eSPI configuration (no User_Setup.h needed) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_INVERSION_ON=1
    -DCGRAM_OFFSET=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=280
    -DTFT_MOSI=11
    -DTFT_SCLK=10
    -DTFT_CS=9
    -DTFT_DC=8
    -DTFT_RST=13
    -DTFT_BL=25
    -DTFT_SPI_PORT=1
    -DTOUCH_CS=-1
    -DDISABLE_ALL_LIBRARY_WARNINGS=1
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=20000000
    ; --- Fonts ---
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; --- Optimization ---
    -Os
    -DARDUINO_ARCH_RP2040=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit PN532@^1.3.3
    ricmoo/QRCode@^0.0.1

monitor_speed = 115200

; ---------------------------------------------------------------------------
; Prototype D (experimental scaffold)
; ESP32 v2 + Waveshare e-ink 1.54 pinout:
;   3v3->VCC, GND->GND, D15->DIN, D2->CLK, D4->CS, D5->DC, D18->RST, D19->BUSY
; NOTE: The current rendering stack is still TFT-first. This env provides
; pin/prototype metadata and build target scaffolding for ongoing e-ink work.
; ---------------------------------------------------------------------------
[env:prototype_d_esp32_eink154]
platform = espressif32
board = esp32dev
framework = arduino
upload_speed = 115200

build_flags =
    -DSOLWEAR_PROTO_ID=\"prototype-d-esp32v2-eink154\"
    -DSOLWEAR_TARGET_MCU=\"esp32\"
    -DSOLWEAR_TARGET_DISPLAY=\"waveshare-eink-1.54\"
    -DSOLWEAR_PROTO_CAPS=\"status,watch-control,eink-test\"
    -DSOLWEAR_EINK_TARGET=1
    -DSOLWEAR_EINK_ROTATE_180=1
    -DSOLWEAR_HAS_TOUCH=0
    -DSOLWEAR_HAS_IMU=0
    -DSOLWEAR_HAS_NFC=0
    -DSOLWEAR_HAS_BATTERY=0
    -DSOLWEAR_HAS_BUZZER=0
    -DPIN_EINK_DIN=15
    -DPIN_EINK_CLK=2
    -DPIN_EINK_CS=4
    -DPIN_EINK_DC=5
    -DPIN_EINK_RST=18
    -DPIN_EINK_BUSY=19
    -Os

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit PN532@^1.3.3
    ricmoo/QRCode@^0.0.1

monitor_speed = 115200

[env:esp32s3_mini]
platform = espressif32
board = lolin_s3_mini
framework = arduino
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Os

; ---------------------------------------------------------------------------
; Prototype 2 / E (ESP32-S3 Mini + ST7789 1.3" 240x240 IPS color + PN532 + TP4056 + 4 Buttons)
; Wiring per Materials/Схематика Прототипа 2.pdf (17.04.2026):
;   LCD:     SCL->GP3, SDA->GP4, RES->GP7, DC->GP8, BLK->GP9
;   Buttons: K1->GP13, K2->GP12, K3->GP11, K4->GP10
;   NFC:     SCL->GP6, SDA->GP5
;   Power:   TP4056 OUT+/- -> 5V/GND (battery LW 303040 3.7V 350mAh)
;   Battery ADC: GP2 (optional, needs 100K/100K divider from B+)
; ---------------------------------------------------------------------------
[env:prototype_e_esp32s3_lcd13]
platform = espressif32
board = lolin_s3_mini
framework = arduino
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSOLWEAR_PROTO_ID=\"prototype-2-esp32s3-lcd13\"
    -DSOLWEAR_TARGET_MCU=\"esp32s3\"
    -DSOLWEAR_TARGET_DISPLAY=\"st7789-240x240-color\"
    -DSOLWEAR_PROTO_CAPS=\"status,watch-control,apps,nfc,battery,charging\"
    -DSOLWEAR_EINK_TARGET=0
    -DSOLWEAR_GRAYSCALE_UI=0
    -DSOLWEAR_HAS_TOUCH=0
    -DSOLWEAR_HAS_BUTTONS=1
    -DSOLWEAR_HAS_IMU=0
    -DSOLWEAR_HAS_NFC=1
    -DSOLWEAR_HAS_BATTERY=1
    -DSOLWEAR_HAS_BUZZER=0
    ; --- TFT_eSPI Settings (ST7789 240x240 IPS, SPI) ---
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=4
    -DTFT_SCLK=3
    -DTFT_CS=-1
    -DTFT_DC=8
    -DTFT_RST=7
    -DTFT_BL=9
    -DTFT_INVERSION_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    ; --- NFC (PN532 via I2C) ---
    -DPIN_NFC_SCL=6
    -DPIN_NFC_SDA=5
    ; --- Hardware buttons (K1..K4) ---
    -DPIN_BUTTON_UP=13
    -DPIN_BUTTON_DOWN=12
    -DPIN_BUTTON_HASH=11
    -DPIN_BUTTON_STAR=10
    ; --- Battery ADC (GP2, needs external 100K/100K divider from TP4056 B+) ---
    -DPIN_BATTERY_ADC=2
    -DBATTERY_DIVIDER=2.0f
    -DSCREEN_WIDTH=240
    -DSCREEN_HEIGHT=240
    -Os
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit PN532@^1.3.3
    ricmoo/QRCode@^0.0.1
