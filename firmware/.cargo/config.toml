[build]
rustflags = ["--cfg", "espidf_time64"]

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"

[env]
MCU = "esp32s3"
ESP_IDF_VERSION = "v5.3.3"
ESP_IDF_TOOLS_INSTALL_DIR = "custom:D:\\espressif"
ESP_IDF_GLOB_PROJECT_BASE = { value = ".", relative = true }
ESP_IDF_GLOB_PROJECT_PARTITIONS = "partitions.csv"
