services:
  solwear-site:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SOLWEAR_DATA_DIR=/data
      - NEXT_PUBLIC_SOLWEAR_DYNAMIC=1
      - X_CLIENT_ID=${X_CLIENT_ID:-}
      - X_CLIENT_SECRET=${X_CLIENT_SECRET:-}
      - X_CALLBACK_URL=${X_CALLBACK_URL:-http://localhost:3000/api/auth/x/callback}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-before-public-deploy}
      - SOLWEAR_X_USER_ID=${SOLWEAR_X_USER_ID:-}
      - PINBOARD_ADMIN_TOKEN=${PINBOARD_ADMIN_TOKEN:-}
    volumes:
      - emails_data:/data
    restart: unless-stopped

volumes:
  emails_data:
    driver: local
